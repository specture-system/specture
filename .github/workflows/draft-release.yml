name: Draft Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump to apply
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

permissions:
  contents: read

jobs:
  draft-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Compute next release version
        id: version
        shell: bash
        run: |
          current_version="$(tr -d '[:space:]' < VERSION)"

          if [[ ! "$current_version" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "VERSION must contain a semantic version like v0.3.1" >&2
            exit 1
          fi

          current_version="${current_version#v}"
          IFS='.' read -r major minor patch <<<"$current_version"

          case "${{ inputs.bump }}" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
          esac

          next_version="v${major}.${minor}.${patch}"
          printf '%s\n' "$next_version" > VERSION
          echo "version=$next_version" >> "$GITHUB_OUTPUT"

      - name: Sync README release pin
        shell: bash
        env:
          NEXT_VERSION: ${{ steps.version.outputs.version }}
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import os
          import re

          version = os.environ["NEXT_VERSION"]
          path = Path("README.md")
          text = path.read_text()
          updated, count = re.subn(
              r"(rev:\s*)v\d+\.\d+\.\d+",
              rf"\g<1>{version}",
              text,
              count=1,
          )

          if count != 1:
              raise SystemExit("expected to update exactly one README release pin")

          path.write_text(updated)
          PY

      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3
        with:
          client-id: ${{ secrets.RELEASE_BOT_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - name: Create pull request
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c
        with:
          token: ${{ steps.app-token.outputs.token }}
          branch: release/${{ steps.version.outputs.version }}
          delete-branch: true
          title: "chore: bump version to ${{ steps.version.outputs.version }}"
          commit-message: "chore: bump version to ${{ steps.version.outputs.version }}"
          body: |
            Bump VERSION to prepare the next release.

            Merge this PR to update main and trigger the release workflow.
          labels: release
