version: 2

project_name: specture

builds:
  - id: specture
    main: ./
    binary: specture
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/specture-system/specture/cmd.Version={{ .Tag }}
      - -X github.com/specture-system/specture/cmd.Commit={{ .ShortCommit }}
    goos:
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: specture
    format: tar.gz
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt
